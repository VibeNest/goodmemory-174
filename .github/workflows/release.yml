name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release gate
        env:
          GOODMEMORY_ASSISTED_EXTRACTOR_API_KEY: ${{ secrets.GOODMEMORY_ASSISTED_EXTRACTOR_API_KEY }}
          GOODMEMORY_ASSISTED_EXTRACTOR_BASE_URL: ${{ secrets.GOODMEMORY_ASSISTED_EXTRACTOR_BASE_URL }}
          GOODMEMORY_ASSISTED_EXTRACTOR_MODEL: ${{ secrets.GOODMEMORY_ASSISTED_EXTRACTOR_MODEL }}
          GOODMEMORY_ASSISTED_EXTRACTOR_PROVIDER: ${{ secrets.GOODMEMORY_ASSISTED_EXTRACTOR_PROVIDER }}
        run: |
          set -euo pipefail
          VERSION="$(bun -e 'import { readFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); console.log(pkg.version);')"
          bun run gate:phase-39 --run-id "release-v${VERSION}"

      - name: Pack release tarball
        id: pack
        run: |
          set -euo pipefail
          mkdir -p dist-release
          VERSION="$(bun -e 'import { readFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); console.log(pkg.version);')"
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::Stable release workflow only supports stable semver versions, got $VERSION"
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag version $TAG_VERSION does not match package.json version $VERSION"
              exit 1
            fi
          fi
          ARTIFACT_PATH="$(bun pm pack --destination dist-release --quiet | tail -n 1)"
          ARTIFACT_NAME="$(basename "$ARTIFACT_PATH")"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          {
            echo "## Release artifact"
            echo "- Version: $VERSION"
            echo "- Name: $ARTIFACT_NAME"
            echo "- Path: $ARTIFACT_PATH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.artifact_name }}
          path: ${{ steps.pack.outputs.artifact_path }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.artifact_path }}
          prerelease: false
          make_latest: true

      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(bun -e 'import { readFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); console.log(pkg.version);')"
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            {
              echo "## npm publish"
              echo "- Skipped: NPM_TOKEN secret is not configured."
              echo "- This does not block the tarball-first stable release contract."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          NPM_USER="$(npm whoami)"
          if npm view "goodmemory@${VERSION}" version >/tmp/goodmemory-published-version.txt 2>/dev/null; then
            PUBLISHED_VERSION="$(cat /tmp/goodmemory-published-version.txt)"
            echo "goodmemory@$VERSION already exists on npm; skipping publish."
          else
            npm publish --access public "${{ steps.pack.outputs.artifact_path }}"
          fi
          PUBLISHED_VERSION=""
          LATEST_VERSION=""
          for attempt in {1..12}; do
            PUBLISHED_VERSION="$(npm view "goodmemory@${VERSION}" version 2>/dev/null || true)"
            LATEST_VERSION="$(npm view goodmemory@latest version 2>/dev/null || true)"
            if [ "$PUBLISHED_VERSION" = "$VERSION" ] && [ "$LATEST_VERSION" = "$VERSION" ]; then
              break
            fi
            echo "Waiting for npm registry visibility for goodmemory@$VERSION (attempt $attempt/12)..."
            sleep 10
          done
          if [ "$PUBLISHED_VERSION" != "$VERSION" ] || [ "$LATEST_VERSION" != "$VERSION" ]; then
            echo "::error::npm registry verification failed: expected version and latest tag $VERSION, got version=${PUBLISHED_VERSION:-<empty>} latest=${LATEST_VERSION:-<empty>}"
            exit 1
          fi
          {
            echo "## npm publish"
            echo "- Verified: goodmemory@$VERSION"
            echo "- Verified dist tag: latest -> $LATEST_VERSION"
            echo "- npm user: $NPM_USER"
          } >> "$GITHUB_STEP_SUMMARY"
