name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v0.1.0-rc.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release gate
        run: bun run gate:phase-29 -- --skip-phase-28-rerun

      - name: Pack release tarball
        id: pack
        run: |
          set -euo pipefail
          mkdir -p dist-release
          VERSION="$(bun -e 'import { readFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); console.log(pkg.version);')"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag version $TAG_VERSION does not match package.json version $VERSION"
              exit 1
            fi
          fi
          ARTIFACT_PATH="$(bun pm pack --destination dist-release --quiet | tail -n 1)"
          ARTIFACT_NAME="$(basename "$ARTIFACT_PATH")"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          {
            echo "## Release artifact"
            echo "- Version: $VERSION"
            echo "- Name: $ARTIFACT_NAME"
            echo "- Path: $ARTIFACT_PATH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.artifact_name }}
          path: ${{ steps.pack.outputs.artifact_path }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.artifact_path }}
          prerelease: true
          make_latest: false

      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing required NPM_TOKEN secret for registry publish." >&2
            exit 1
          fi
          bun publish --tag rc --access public --tolerate-republish "${{ steps.pack.outputs.artifact_path }}"
