name: Eval

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional case limit"
        required: false
        type: string
      scenario_id:
        description: "Optional scenario id"
        required: false
        type: string
      failures_from:
        description: "Optional prior run directory for failed-subset reruns"
        required: false
        type: string
      output_dir:
        description: "Optional output directory"
        required: false
        type: string
  schedule:
    - cron: "0 1 * * 1"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check live eval secrets
        id: live-eval-secrets
        env:
          GOODMEMORY_EVAL_PROVIDER: ${{ secrets.GOODMEMORY_EVAL_PROVIDER }}
          GOODMEMORY_EVAL_MODEL: ${{ secrets.GOODMEMORY_EVAL_MODEL }}
          GOODMEMORY_EVAL_API_KEY: ${{ secrets.GOODMEMORY_EVAL_API_KEY }}
          GOODMEMORY_JUDGE_PROVIDER: ${{ secrets.GOODMEMORY_JUDGE_PROVIDER }}
          GOODMEMORY_JUDGE_MODEL: ${{ secrets.GOODMEMORY_JUDGE_MODEL }}
          GOODMEMORY_JUDGE_API_KEY: ${{ secrets.GOODMEMORY_JUDGE_API_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            GOODMEMORY_EVAL_PROVIDER
            GOODMEMORY_EVAL_MODEL
            GOODMEMORY_EVAL_API_KEY
            GOODMEMORY_JUDGE_PROVIDER
            GOODMEMORY_JUDGE_MODEL
            GOODMEMORY_JUDGE_API_KEY
          )
          missing=()
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "secrets_available=false" >> "$GITHUB_OUTPUT"
          {
            echo "## Live eval skipped"
            echo "- Live eval skipped because required secrets are missing."
            echo "- Missing required secrets: ${missing[*]}"
            echo "- Scheduled eval needs live provider and judge secrets before it can produce evidence."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            echo "Missing required secrets: ${missing[*]}" >&2
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.live-eval-secrets.outputs.secrets_available == 'true'
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        if: steps.live-eval-secrets.outputs.secrets_available == 'true'
        run: bun install --frozen-lockfile

      - name: Run eval suite
        if: steps.live-eval-secrets.outputs.secrets_available == 'true'
        env:
          GOODMEMORY_EVAL_PROVIDER: ${{ secrets.GOODMEMORY_EVAL_PROVIDER }}
          GOODMEMORY_EVAL_MODEL: ${{ secrets.GOODMEMORY_EVAL_MODEL }}
          GOODMEMORY_EVAL_API_KEY: ${{ secrets.GOODMEMORY_EVAL_API_KEY }}
          GOODMEMORY_JUDGE_PROVIDER: ${{ secrets.GOODMEMORY_JUDGE_PROVIDER }}
          GOODMEMORY_JUDGE_MODEL: ${{ secrets.GOODMEMORY_JUDGE_MODEL }}
          GOODMEMORY_JUDGE_API_KEY: ${{ secrets.GOODMEMORY_JUDGE_API_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            GOODMEMORY_EVAL_PROVIDER
            GOODMEMORY_EVAL_MODEL
            GOODMEMORY_EVAL_API_KEY
            GOODMEMORY_JUDGE_PROVIDER
            GOODMEMORY_JUDGE_MODEL
            GOODMEMORY_JUDGE_API_KEY
          )
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done
          ARGS=()
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=("--limit=${{ github.event.inputs.limit }}")
          fi
          if [ -n "${{ github.event.inputs.scenario_id }}" ]; then
            ARGS+=("--scenario-id=${{ github.event.inputs.scenario_id }}")
          fi
          if [ -n "${{ github.event.inputs.failures_from }}" ]; then
            ARGS+=("--failures-from=${{ github.event.inputs.failures_from }}")
          fi
          if [ -n "${{ github.event.inputs.output_dir }}" ]; then
            ARGS+=("--output-dir=${{ github.event.inputs.output_dir }}")
          fi
          bun run eval:live -- "${ARGS[@]}"

      - name: Summarize eval run
        if: steps.live-eval-secrets.outputs.secrets_available == 'true'
        run: |
          set -euo pipefail
          OUTPUT_DIR="${{ github.event.inputs.output_dir }}"
          if [ -z "$OUTPUT_DIR" ]; then
            OUTPUT_DIR="reports/eval/live"
          fi
          RUN_DIR="$(ls -dt "$OUTPUT_DIR"/run-* | head -n 1)"
          bun run eval:summary -- "$RUN_DIR" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload eval artifacts
        if: steps.live-eval-secrets.outputs.secrets_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: ${{ github.event.inputs.output_dir || 'reports/eval/live' }}
