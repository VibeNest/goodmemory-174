name: Eval

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional case limit"
        required: false
        type: string
      scenario_id:
        description: "Optional scenario id"
        required: false
        type: string
      failures_from:
        description: "Optional prior run directory for failed-subset reruns"
        required: false
        type: string
      output_dir:
        description: "Optional output directory"
        required: false
        type: string
  schedule:
    - cron: "0 1 * * 1"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run eval suite
        env:
          GOODMEMORY_EVAL_PROVIDER: ${{ secrets.GOODMEMORY_EVAL_PROVIDER }}
          GOODMEMORY_EVAL_MODEL: ${{ secrets.GOODMEMORY_EVAL_MODEL }}
          GOODMEMORY_EVAL_API_KEY: ${{ secrets.GOODMEMORY_EVAL_API_KEY }}
          GOODMEMORY_JUDGE_PROVIDER: ${{ secrets.GOODMEMORY_JUDGE_PROVIDER }}
          GOODMEMORY_JUDGE_MODEL: ${{ secrets.GOODMEMORY_JUDGE_MODEL }}
          GOODMEMORY_JUDGE_API_KEY: ${{ secrets.GOODMEMORY_JUDGE_API_KEY }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=("--limit=${{ github.event.inputs.limit }}")
          fi
          if [ -n "${{ github.event.inputs.scenario_id }}" ]; then
            ARGS+=("--scenario-id=${{ github.event.inputs.scenario_id }}")
          fi
          if [ -n "${{ github.event.inputs.failures_from }}" ]; then
            ARGS+=("--failures-from=${{ github.event.inputs.failures_from }}")
          fi
          if [ -n "${{ github.event.inputs.output_dir }}" ]; then
            ARGS+=("--output-dir=${{ github.event.inputs.output_dir }}")
          fi
          bun run eval:full -- "${ARGS[@]}"

      - name: Summarize eval run
        run: |
          set -euo pipefail
          RUN_DIR="$(ls -dt reports/eval/run-* | head -n 1)"
          bun run eval:summary -- "$RUN_DIR" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: reports/eval
