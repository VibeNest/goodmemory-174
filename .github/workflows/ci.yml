name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GOODMEMORY_TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install sqlite-vss Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1 libatlas-base-dev liblapack-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI gate
        run: bun run test:ci

  node-package-boundary:
    name: Node package boundary (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install sqlite-vss Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1 libatlas-base-dev liblapack-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package boundary
        run: bun run build

      - name: Verify Node package boundary
        run: bun test tests/release/node-package-boundary.test.ts
